<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ajustes de Extensión</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 250px;
      padding: 16px;
      margin: 0;
      background-color: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 {
      margin: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
    }
    /* Switch Styles */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #ff6b2b; /* Naranja/Rayo */
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    button.dashboard-btn {
      background-color: #6a0dad; /* Morado */
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button.dashboard-btn:hover {
      background-color: #550a8a;
    }
  </style>
</head>
<body>
  <h2>⚡ Text Expander & CRM</h2>
  
  <div class="toggle-container">
    <span>Extensión Activa</span>
    <label class="switch">
      <input type="checkbox" id="extensionToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <button class="dashboard-btn" id="openDashboard">Abrir Dashboard</button>

  <script src="popup.js"></script>
</body>
</html>
