<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADB SMS Sender</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand">
                <span class="icon">💬</span>
                <h1>ADB SMS Sender</h1>
            </div>
            <div class="status-badge" id="adbStatus">Verificando ADB...</div>
        </header>

        <main>
            <div class="panel glass">
                <h2>Configuración del Mensaje</h2>
                <div class="input-group">
                    <label for="message">Mensaje SMS:</label>
                    <textarea id="message" rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>

                <div class="input-group">
                    <label for="numbers">Lista de Números (Separados por salto de línea o comas):</label>
                    <textarea id="numbers" rows="6" placeholder="+51999888777\n+51999888666..."></textarea>
                    <small>Se ignorarán automáticamente los números que ya estén en el historial.</small>
                </div>

                <div class="input-group">
                    <label for="whitelist">Lista Blanca (Estos números ignoran el historial, separados por comas):</label>
                    <input type="text" id="whitelist" placeholder="+51... , +51..." style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                </div>

                <div class="row" style="display: flex; gap: 1rem;">
                    <div class="input-group" style="flex: 1;">
                        <label for="delay">Intervalo (seg):</label>
                        <input type="number" id="delay" value="10" min="1" max="60" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                    </div>
                    <div class="input-group" style="flex: 2;">
                        <label>Coordenadas de Enviar (X, Y):</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="coordX" value="965" placeholder="X" style="width: 50%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                            <input type="number" id="coordY" value="2240" placeholder="Y" style="width: 50%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                        </div>
                    </div>
                </div>

                <button id="sendBtn" class="btn primary">Iniciar Envío</button>
            </div>

            <div class="panel glass" style="border: 2px dashed #3b82f6; background: rgba(59, 130, 246, 0.05);">
                <h2>Modo de Prueba (Bucle Infinito)</h2>
                <div class="row" style="display: flex; gap: 1rem;">
                    <div class="input-group" style="flex: 2;">
                        <label>Número a testear:</label>
                        <input type="text" id="loopNumber" placeholder="+51999999999" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Intervalo (seg):</label>
                        <input type="number" id="loopDelay" value="1" min="1" max="60" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                    </div>
                </div>
                <div class="row" style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="startLoopBtn" class="btn" style="flex: 1; background: #10b981;">▶ Iniciar Bucle</button>
                    <button id="stopLoopBtn" class="btn" style="flex: 1; background: #ef4444; display: none;">⏹ Detener Bucle</button>
                </div>
            </div>

            <div class="panel glass">
                <h2>Estado en Tiempo Real</h2>
                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-value" id="queueCount">0</span>
                        <span class="stat-label">En Cola</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-value" id="historyCount">0</span>
                        <span class="stat-label">Historial (Enviados)</span>
                    </div>
                </div>
                <div class="log-container" id="logContainer">
                    <!-- Logs will appear here -->
                </div>
            </div>

            <div class="panel glass">
                <h2>Gestión de Historial y Blacklist</h2>
                <div class="blacklist-controls" style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="blacklistInput" placeholder="Añadir número a Blacklist (+51...)" style="flex: 1; padding: 0.8rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white;">
                    <button id="addBlacklistBtn" class="btn" style="background: var(--primary);">Añadir</button>
                </div>
                <div class="history-table-container" style="max-height: 250px; overflow-y: auto;">
                    <table class="history-table" style="width: 100%; text-align: left; border-collapse: collapse;">
                        <thead>
                            <tr style="border-bottom: 1px solid rgba(255,255,255,0.2);">
                                <th style="padding: 10px;">Número</th>
                                <th style="padding: 10px; width: 80px;">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <!-- Rows -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
